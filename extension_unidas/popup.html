<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Batycar: Unidas Sync</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { width: 320px; min-height: 200px; padding: 16px; margin: 0; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
  <div class="flex items-center gap-2 mb-4">
    <div class="w-8 h-8 flex items-center justify-center bg-blue-600 text-white rounded-md font-bold text-lg">
      B
    </div>
    <h1 class="text-base font-bold">Unidas Sync</h1>
  </div>

  <div id="status-card" class="bg-yellow-50 border border-yellow-200 rounded-md p-3 mb-4 text-sm">
    <p class="font-medium text-yellow-800">Verificando página...</p>
    <p class="text-yellow-600 text-xs mt-1">Aguarde a conexão com o pátio.</p>
  </div>

  <div class="space-y-2" id="action-buttons" style="display: none;">
    <button id="btn-sync-reservas" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-3 rounded text-sm flex items-center justify-center gap-2 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
      Sincronizar [Reservas]
    </button>
    
    <button id="btn-sync-patio" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-3 rounded text-sm flex items-center justify-center gap-2 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
      Sincronizar [Pátio]
    </button>
  </div>

  <div class="mt-4 pt-4 border-t border-gray-200 text-center">
    <p class="text-xs text-gray-400">Desenvolvido para Batycar</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
